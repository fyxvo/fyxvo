[toolchain]
anchor_version = "0.32.1"
solana_version = "2.3.0"
package_manager = "pnpm"

[features]
resolution = true
skip-lint = false

[programs.localnet]
fyxvo = "FQ5pyjBQvfadKPPxd66YXksgn8veYnjEw2R1g6aQnFaa"

[programs.devnet]
fyxvo = "FQ5pyjBQvfadKPPxd66YXksgn8veYnjEw2R1g6aQnFaa"

[workspace]
members = ["programs/*"]

[provider]
cluster = "Localnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "pnpm exec ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"
